server.port=8020
spring.application.name=api-gateway
#spring.cloud.config.enabled=true
eureka.client.serviceUrl.defaultZone=http://localhost:8010/eureka

# Unique name registration with Eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lowerCaseServiceId=true

# Enable load balancing for the gateway

# Route identifier (unique name for this route)
spring.cloud.gateway.routes[0].id=user-service

# URI of the target service
# 'lb://' means use load balancer (typically via service discovery like Eureka)
spring.cloud.gateway.routes[0].uri=lb://user-service

# Predicate to match incoming requests
# Routes requests starting with /user-service/ to this route
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/**

# Filter to modify the request before forwarding
# StripPrefix=1 removes the first path segment (/user-service)
# Example: /user-service/api/users → /api/users
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# http://localhost:8020/user-service/api/users/hello

# Any request to http://localhost:8020/user-service/** will be routed to your user-microservice (as registered in Eureka).

